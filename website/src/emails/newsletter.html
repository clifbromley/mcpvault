<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0a0a0a;padding:40px 20px;">
    <tr><td align="center">
      <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;">
        <!-- Header -->
        <tr><td style="padding-bottom:32px;">
          <table cellpadding="0" cellspacing="0"><tr>
            <td style="font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.02em;">MCPVault</td>
          </tr></table>
        </td></tr>
        <!-- Card -->
        <tr><td style="background-color:#141414;border:1px solid #252525;border-radius:12px;padding:36px;">
          {{content}}
          <table cellpadding="0" cellspacing="0" style="margin-top:28px;"><tr>
            <td style="background-color:#7c3aed;border-radius:8px;">
              <a href="https://mcpvault.org" style="display:inline-block;padding:10px 24px;font-size:14px;font-weight:600;color:#ffffff;text-decoration:none;">mcpvault.org</a>
            </td>
            <td style="padding-left:12px;">
              <a href="https://github.com/bitbonsai/mcpvault/issues" style="display:inline-block;padding:10px 24px;font-size:14px;font-weight:600;color:#525252;text-decoration:none;border:1px solid #333;border-radius:8px;">Open an issue</a>
            </td>
            <td style="padding-left:12px;">
              <a href="{{{RESEND_UNSUBSCRIBE_URL}}}" style="display:inline-block;padding:10px 24px;font-size:14px;font-weight:600;color:#3f3f3f;text-decoration:none;border:1px solid #252525;border-radius:8px;">Unsubscribe</a>
            </td>
          </tr></table>
        </td></tr>
        <!-- Footer -->
        <tr><td style="padding-top:28px;text-align:center;">
          <p style="margin:0 0 8px;font-size:13px;color:#525252;">MCPVault &middot; Universal AI Bridge for Obsidian</p>
          <p style="margin:0;font-size:12px;color:#3f3f3f;">
            <a href="https://github.com/bitbonsai/mcpvault" style="color:#525252;text-decoration:none;">GitHub</a>
            &nbsp;&middot;&nbsp;
            <a href="https://www.npmjs.com/package/@bitbonsai/mcpvault" style="color:#525252;text-decoration:none;">npm</a>
          </p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
